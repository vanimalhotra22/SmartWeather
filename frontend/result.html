<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Results —Agroweather</title>
  <link rel="stylesheet" href="assets/style.css">
  <script src="assets/js/translator.js" defer></script>
</head>
<body>
  <nav class="navbar">
    <div class="logo">SmartAgro</div>
    <div class="nav-links">
      <a href="index.html" data-translate-key="home">Home</a>
      <a href="input.html" data-translate-key="enter_data">Enter Data</a>
      <a href="result.html" data-translate-key="results">Results</a>
      <a href="disease.html" data-translate-key="disease_detect">Disease Detect</a>
      <a href="chatbot.html" data-translate-key="assistant">Assistant</a>
      <select id="language-selector" class="language-selector">
        <option value="en">English</option>
        <option value="hi">हिन्दी (Hindi)</option>
      </select>
    </div>
  </nav>

  <main class="container">
    <h1>Recommendation Results</h1>

    <div id="main-action-container" class="main-action">
      <a href="input.html" class="btn">Get a New Recommendation</a>
    </div>

    <div id="results-container">
      </div>
  </main>

  <script>
    const mainActionContainer = document.getElementById('main-action-container');
    const resultsContainer = document.getElementById('results-container');
    const history = JSON.parse(localStorage.getItem('predictionHistory'));

    if (history && history.length > 0) {
      mainActionContainer.style.display = 'block';

      history.forEach((result, i) => {
        const confidencePercentage = result.confidence ? (result.confidence * 100).toFixed(1) + "%" : "N/A";
        const cardWrapper = document.createElement('div');
        cardWrapper.classList.add('result-card-wrapper'); 

        const latestClass = (i === 0) ? 'latest-result' : '';

        cardWrapper.innerHTML = `
          <div class="result-card ${latestClass}">
            <div class="result-header">
              <span class="result-label">Recommended Crop (Click name for info)</span>
              <a href="chatbot.html" class="crop-link" data-crop="${result.recommended_crop}">
                <h2 class="result-crop-name">🌾 ${result.recommended_crop}</h2>
              </a>
            </div>
            
            <div class="conditions-card">
                <h4 class="conditions-title">Based on these conditions:</h4>
                <div class="conditions-grid">
                    <div class="condition-item">🌡️ Temp: <span>${result.inputs.temperature_c}°C</span></div>
                    <div class="condition-item">💧 Rainfall: <span>${result.inputs.rainfall_mm} mm</span></div>
                    <div class="condition-item">☀️ Sunlight: <span>${result.inputs.sunlight_hours} hrs</span></div>
                    <div class="condition-item">💦 Humidity: <span>${result.inputs.humidity_percent}%</span></div>
                    <div class="condition-item">🌱 Soil pH: <span>${result.inputs.soil_ph}</span></div>
                    <div class="condition-item">💧 Soil Moisture: <span>${result.inputs.soil_moisture_percent}%</span></div>
                </div>
            </div>

            <div class="details-grid">
              <div class="detail-item">
                <span class="detail-label">📊 Confidence Score</span>
                <p class="confidence-badge">${confidencePercentage}</p>
              </div>
              <div class="detail-item">
                <span class="detail-label">📈 Predicted Yield</span>
                <p>${result.predicted_yield_kg_per_hectare || 'N/A'} kg/hectare</p>
              </div>
              <div class="detail-item">
                <span class="detail-label">📅 Estimated Sowing Date</span>
                <p>${result.sowing_date || "Not Provided"}</p>
              </div>
              <div class="detail-item">
                <span class="detail-label">📅 Estimated Harvest Date</span>
                <p>${result.harvest_date || "Not Provided"}</p>
              </div>
            </div>
          </div>
        `;
        resultsContainer.appendChild(cardWrapper);
      });

      resultsContainer.addEventListener('click', (e) => {
        const link = e.target.closest('.crop-link');
        if (link) {
          e.preventDefault(); 
          const cropName = link.dataset.crop;
          localStorage.setItem('chatbotQuery', `Give me a basic guide to growing ${cropName}.`);
          window.location.href = link.href;
        }
      });

    } else {
      mainActionContainer.style.display = 'none';
      resultsContainer.innerHTML = `
        <div class="result-card empty-state">
          <h3>No Results Found</h3>
          <p>You haven't made a prediction yet. Please enter your farm data to get a recommendation.</p>
          <a href="input.html" class="btn">Enter Farm Data</a>
        </div>
      `;
    }
  </script>
  <footer>
    <p>© 2025 Agroweather. All rights reserved.</p>
  </footer>
</body>
</html>
