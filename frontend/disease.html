<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Disease Detection — AgroWeather</title>
  <link rel="stylesheet" href="assets/style.css">
  <script src="assets/js/translator.js" defer></script>
  <script src="assets/js/auth.js" defer></script>
</head>
<body>
  <nav class="navbar">
    <div class="logo">Agroweather</div>
    <div class="nav-links">
      <a href="index.html" data-translate-key="home">Home</a>
      <a href="input.html" data-translate-key="enter_data">Enter Data</a>
      <a href="result.html" data-translate-key="results">Results</a>
      <a href="disease.html" data-translate-key="disease_detect">Disease Detect</a>
      <a href="chatbot.html" data-translate-key="assistant">Assistant</a>
      <select id="language-selector" class="language-selector">
        <option value="en">English</option>
        <option value="hi">हिन्दी (Hindi)</option>
      </select>
    </div>
  </nav>

  <div class="container">
    <h1 data-translate-key="disease_title">Disease Detection</h1>
    <form id="disease-form" class="upload-box">
      <p data-translate-key="upload_prompt">📷 Upload a crop leaf image for disease detection</p>
      <input type="file" id="image-input" accept="image/*" class="file-input">
      <label for="image-input" class="btn btn-secondary" data-translate-key="choose_file">Choose File</label>
      <span id="file-name" data-translate-key="no_file">No file chosen</span>
      <button type="submit" class="btn" data-translate-key="analyze_image">Analyze Image</button>
    </form>
    
    <div id="disease-result-container" style="display:none;">
      </div>
  </div>

  <script>
    const BACKEND = "http://127.0.0.1:8000";
    const diseaseForm = document.getElementById("disease-form");
    const imageInput = document.getElementById("image-input");
    const fileNameSpan = document.getElementById("file-name");
    const resultContainer = document.getElementById("disease-result-container");

    imageInput.addEventListener("change", () => {
      fileNameSpan.textContent = imageInput.files.length > 0 ? imageInput.files[0].name : "No file chosen";
    });

    diseaseForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const file = imageInput.files[0];
      if (!file) {
        alert("Please upload an image first!");
        return;
      }
      
      resultContainer.style.display = "block";
      resultContainer.innerHTML = `<div class="result-card"><p class="loading-text" data-translate-key="analyzing">Analyzing image, please wait...</p></div>`;
      if (window.applyTranslations) window.applyTranslations(localStorage.getItem('selectedLanguage') || 'en');

      const formData = new FormData();
      formData.append("file", file);

      try {
        const selectedLang = localStorage.getItem('selectedLanguage') || 'en';
        const user = window.auth.getUser();
        let url = `${BACKEND}/api/detect_disease?language=${selectedLang}`;
        if (user) {
          url += `&google_id=${user.google_id}`;
        }

        const res = await fetch(url, {
          method: "POST",
          body: formData
        });

        if (!res.ok) throw new Error('Analysis failed.');
        
        const data = await res.json();
        const diseaseName = data.prediction || "Unknown";
        const description = data.description || "Details not available.";
        const prevention = data.prevention || "Check trusted agricultural sources for prevention tips.";

        resultContainer.innerHTML = `
          <div class="result-card">
            <div class="details-grid-disease">
              <div class="detail-item-disease main-prediction">
                <span class="detail-label" data-translate-key="analysis_result">🔍 Analysis Result</span>
                <h2 class="disease-name ${diseaseName.toLowerCase() === 'healthy' ? 'healthy' : 'disease'}">${diseaseName}</h2>
              </div>
              <div class="detail-item-disease">
                <span class="detail-label" data-translate-key="description_label">ℹ️ Description</span>
                <p>${description}</p>
              </div>
              <div class="detail-item-disease">
                <span class="detail-label" data-translate-key="action_label">🛡️ Suggested Action</span>
                <p>${prevention}</p>
              </div>
            </div>
          </div>
        `;
        if (window.applyTranslations) window.applyTranslations(localStorage.getItem('selectedLanguage') || 'en');
      } catch (error) {
        resultContainer.innerHTML = `<div class="result-card empty-state"><p>Error: Could not analyze the image. Please try again.</p></div>`;
      }
    });
  </script>
  <footer>
    <p>© 2025 Agroweather. All rights reserved.</p>
  </footer>
</body>
</html>
