<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Disease Detection — AgroWeather</title>
  <link rel="stylesheet" href="assets/style.css">
  <script src="assets/js/translator.js" defer></script>
</head>
<body>
  <nav class="navbar">
    <div class="logo">Agroweather</div>
    <div class="nav-links">
      <a href="index.html" data-translate-key="home">Home</a>
      <a href="input.html" data-translate-key="enter_data">Enter Data</a>
      <a href="result.html" data-translate-key="results">Results</a>
      <a href="disease.html" data-translate-key="disease_detect">Disease Detect</a>
      <a href="chatbot.html" data-translate-key="assistant">Assistant</a>
      <select id="language-selector" class="language-selector">
        <option value="en">English</option>
        <option value="hi">हिन्दी (Hindi)</option>
      </select>
    </div>
  </nav>

  <div class="container">
    <h1>Disease Detection</h1>
    <form id="disease-form" class="upload-box">
      <p>📷 Upload a crop leaf image for disease detection</p>
      <input type="file" id="image-input" accept="image/*" class="file-input">
      <label for="image-input" class="btn btn-secondary">Choose File</label>
      <span id="file-name">No file chosen</span>
      <button type="submit" class="btn">Analyze Image</button>
    </form>
    
    <div id="disease-result-container" style="display:none;">
      </div>
  </div>

  <script>
    const BACKEND = "http://127.0.0.1:8000";
    const diseaseForm = document.getElementById("disease-form");
    const imageInput = document.getElementById("image-input");
    const fileNameSpan = document.getElementById("file-name");
    const resultContainer = document.getElementById("disease-result-container");

    imageInput.addEventListener("change", () => {
      fileNameSpan.textContent = imageInput.files.length > 0 ? imageInput.files[0].name : "No file chosen";
    });

    async function getDiseaseInfo(diseaseName) {
      const selectedLang = localStorage.getItem('selectedLanguage') || 'en';
      if (diseaseName.toLowerCase() === 'healthy') {
        return {
          description: "The leaf appears to be healthy. No signs of common diseases were detected.",
          prevention: "To maintain plant health, ensure proper watering, adequate sunlight, and nutrient-rich soil."
        };
      }
      
      const res = await fetch(BACKEND + "/api/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ 
            message: `In 50 words, what is ${diseaseName} disease in plants and what is one prevention tip? Structure the response as: "Description:... Prevention:..."`,
            language: selectedLang 
        })
      });

      if (!res.ok) {
        return { description: "Could not fetch details.", prevention: "Please check the Assistant for more information." };
      }
      const data = await res.json();
      const reply = data.reply || "";
      
      const descriptionMatch = reply.match(/Description:(.*?)(Prevention:|$)/s);
      const preventionMatch = reply.match(/Prevention:(.*)/s);

      return {
        description: descriptionMatch ? descriptionMatch[1].trim() : "Details not available.",
        prevention: preventionMatch ? preventionMatch[1].trim() : "Check trusted agricultural sources for prevention tips."
      };
    }

    diseaseForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const file = imageInput.files[0];
      if (!file) {
        alert("Please upload an image first!");
        return;
      }
      
      resultContainer.style.display = "block";
      resultContainer.innerHTML = `<div class="result-card"><p class="loading-text">Analyzing image, please wait...</p></div>`;

      const formData = new FormData();
      formData.append("file", file);

      try {
        const res = await fetch(BACKEND + "/api/detect_disease", {
          method: "POST",
          body: formData
        });

        if (!res.ok) throw new Error('Analysis failed.');
        
        const data = await res.json();
        const diseaseName = data.prediction || "Unknown";

        const diseaseInfo = await getDiseaseInfo(diseaseName);

        resultContainer.innerHTML = `
          <div class="result-card">
            <div class="details-grid-disease">
              <div class="detail-item-disease main-prediction">
                <span class="detail-label">🔍 Analysis Result</span>
                <h2 class="disease-name ${diseaseName.toLowerCase() === 'healthy' ? 'healthy' : 'disease'}">${diseaseName}</h2>
              </div>
              <div class="detail-item-disease">
                <span class="detail-label">ℹ️ Description</span>
                <p>${diseaseInfo.description}</p>
              </div>
              <div class="detail-item-disease">
                <span class="detail-label">🛡️ Suggested Action</span>
                <p>${diseaseInfo.prevention}</p>
              </div>
            </div>
          </div>
        `;
      } catch (error) {
        resultContainer.innerHTML = `<div class="result-card empty-state"><p>Error: Could not analyze the image. Please try again.</p></div>`;
      }
    });
  </script>
  <footer>
    <p>© 2025 Agroweather. All rights reserved.</p>
  </footer>
</body>
</html>
