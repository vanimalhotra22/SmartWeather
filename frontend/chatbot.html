<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Assistant —Agroweather</title>
  <link rel="stylesheet" href="assets/style.css">
  <script src="assets/js/translator.js" defer></script>
  <script src="assets/js/auth.js" defer></script>
</head>
<body>
  <nav class="navbar">
    <div class="logo">Agroweather</div>
    <div class="nav-links">
      <a href="index.html" data-translate-key="home">Home</a>
      <a href="input.html" data-translate-key="enter_data">Enter Data</a>
      <a href="result.html" data-translate-key="results">Results</a>
      <a href="disease.html" data-translate-key="disease_detect">Disease Detect</a>
      <a href="chatbot.html" data-translate-key="assistant">Assistant</a>
      <select id="language-selector" class="language-selector">
        <option value="en">English</option>
        <option value="hi">हिन्दी (Hindi)</option>
      </select>
    </div>
  </nav>

  <div class="container">
    <h1 data-translate-key="chatbot_title">Agroweather Assistant</h1>
    <div class="chatbox" id="chatbox">
      </div>
    
    <div class="suggestion-chips" id="suggestion-chips">
        <div class="chip" data-translate-key="chip_recommend">Recommend a crop</div>
        <div class="chip" data-translate-key="chip_irrigation">What is drip irrigation?</div>
        <div class="chip" data-translate-key="chip_disease">How to prevent rust disease?</div>
    </div>
    
    <form id="chat-form" class="chat-input">
      <input type="text" id="message-input" placeholder="Type your question..." data-translate-key="chatbot_placeholder" required autocomplete="off">
      <button type="submit" class="btn" data-translate-key="chatbot_send">Send</button>
    </form>
  </div>

  <script>
    const BACKEND = "http://127.0.0.1:8000";
    const chatbox = document.getElementById("chatbox");
    const chatForm = document.getElementById("chat-form");
    const messageInput = document.getElementById("message-input");
    const suggestionChipsContainer = document.getElementById("suggestion-chips");

    function addMessage(text, sender, translationKey = null) {
      const msg = document.createElement("div");
      msg.className = `chat ${sender}`;
      msg.textContent = text;
      if (translationKey) {
        msg.setAttribute('data-translate-key', translationKey);
      }
      chatbox.appendChild(msg);
      chatbox.scrollTop = chatbox.scrollHeight;
    }

    function showLoadingIndicator() {
      const indicator = document.createElement("div");
      indicator.className = "chat bot loading-indicator";
      indicator.id = "loading-indicator";
      indicator.innerHTML = `<span></span><span></span><span></span>`;
      chatbox.appendChild(indicator);
      chatbox.scrollTop = chatbox.scrollHeight;
    }

    function removeLoadingIndicator() {
      const indicator = document.getElementById("loading-indicator");
      if (indicator) {
        indicator.remove();
      }
    }

    async function sendMessage(message) {
      if (!message.trim()) return;

      addMessage(message, "user");
      messageInput.value = "";
      suggestionChipsContainer.style.display = 'none';
      
      showLoadingIndicator();

      try {
        const selectedLang = localStorage.getItem('selectedLanguage') || 'en';
        const user = window.auth.getUser();
        const res = await fetch(BACKEND + "/api/chat", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({
            message: message,
            language: selectedLang,
            google_id: user ? user.google_id : null
          })
        });

        removeLoadingIndicator();
        if (!res.ok) {
          addMessage("Sorry, I'm having trouble connecting. Please try again later.", "bot");
          return;
        }

        const data = await res.json();
        addMessage(data.reply || "I'm not sure how to respond to that.", "bot");

      } catch (error) {
        removeLoadingIndicator();
        addMessage("An error occurred. Please check your connection and try again.", "bot");
      }
    }

    chatForm.addEventListener("submit", (e) => {
      e.preventDefault();
      sendMessage(messageInput.value);
    });
    
    suggestionChipsContainer.addEventListener('click', (e) => {
      if (e.target && e.target.classList.contains('chip')) {
        const message = e.target.textContent;
        messageInput.value = message;
        sendMessage(message);
      }
    });

    document.addEventListener("DOMContentLoaded", () => {
      setTimeout(() => {
        const welcomeText = (window.getTranslation && window.getTranslation('assistant_welcome')) || "Hello! I'm the SmartAgro Assistant. How can I help you with your farming questions today?";
        addMessage(welcomeText, "bot", "assistant_welcome");
      }, 500);

      const prefilledQuery = localStorage.getItem('chatbotQuery');
      if (prefilledQuery) {
        suggestionChipsContainer.style.display = 'none';
        setTimeout(() => {
          sendMessage(prefilledQuery);
          localStorage.removeItem('chatbotQuery');
        }, 1500);
      }
    });
  </script>
  <footer>
    <p>© 2025 Agroweather. All rights reserved.</p>
  </footer>
</body>
</html>
